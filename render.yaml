services:
  - type: web
    name: trainer-database
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    # Do not store secrets or placeholder connection values here.
    # Set real environment variables in the Render dashboard or via CLI.
    envVars:
      - key: DB_DRIVER
        value: "pgsql"
      - key: DB_HOST
        value: "<REPLACE_WITH_REAL_HOST_OR_LEAVE_EMPTY_IF_USING_DATABASE_URL>"
      - key: DB_HOSTADDR
        value: "<REPLACE_WITH_IPV4_IF_NEEDED>"
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: "<REPLACE_WITH_REAL_DB_NAME>"
      - key: DB_USER
        value: "<REPLACE_WITH_REAL_DB_USER>"
      - key: DB_PASS
        value: "<REPLACE_WITH_REAL_DB_PASS>"
      - key: DB_SSLMODE
        value: "require"
      - key: APP_ENCRYPTION_KEY
        value: "<REPLACE_WITH_RANDOM_SECRET>"
