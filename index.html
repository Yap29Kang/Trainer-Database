<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainer Database</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta http-equiv="refresh" content="0; url=https://trainer-database.onrender.com/">
  <style>
    :root {
      color-scheme: light;
      --bg1: #f5f7fb;
      --bg2: #e9eef9;
      --ink: #10203a;
      --muted: #5d6b82;
      --card: rgba(255,255,255,.88);
      --border: rgba(16,32,58,.12);
      --accent: #2457f5;
    }
    html, body { height: 100%; margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: var(--ink); background: linear-gradient(135deg, var(--bg1), var(--bg2)); }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(36,87,245,.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(35,190,165,.10), transparent 35%);
      pointer-events: none;
    }
    .panel {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(620px, 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 18px 50px rgba(16,32,58,.12);
      padding: 28px;
      box-sizing: border-box;
    }
    h1 { margin: 0 0 10px; font-size: 1.4rem; }
    p { margin: 0 0 18px; color: var(--muted); line-height: 1.5; }
    a {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    .small { margin-top: 14px; font-size: .9rem; color: var(--muted); }
  </style>
  <script>
    window.location.replace('https://trainer-database.onrender.com/');
  </script>
</head>
<body>
  <div class="panel">
    <div class="card">
      <h1>Redirecting to Trainer Database</h1>
      <p>If you are not redirected automatically, open the backend directly.</p>
      <a href="https://trainer-database.onrender.com/">Open backend</a>
      <div class="small">This Vercel page is only a launcher; the app runs on Render so PHP sessions and admin mode work correctly.</div>
    </div>
  </div>
</body>
</html>
