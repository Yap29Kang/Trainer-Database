<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainer Database</title>
  <style>
    :root {
      --bg1: #f5f7fb;
      --bg2: #e9eef9;
      --ink: #10203a;
      --muted: #5d6b82;
      --card: rgba(255,255,255,.82);
      --border: rgba(16,32,58,.12);
      --accent: #2457f5;
    }
    html, body { height: 100%; margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: var(--ink); background: linear-gradient(135deg, var(--bg1), var(--bg2)); }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(36,87,245,.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(35,190,165,.10), transparent 35%);
      pointer-events: none;
    }
    .shell { position: relative; z-index: 1; display: grid; grid-template-rows: auto 1fr; height: 100%; }
    .bar {
      margin: 16px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      box-shadow: 0 18px 45px rgba(16,32,58,.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      backdrop-filter: blur(14px);
    }
    .brand { display: flex; flex-direction: column; gap: 2px; }
    .brand strong { font-size: 1rem; letter-spacing: .2px; }
    .brand span { font-size: .86rem; color: var(--muted); }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 14px;
      text-decoration: none;
      font-size: .92rem;
      font-weight: 600;
    }
    .btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
    .frameWrap { margin: 0 16px 16px; border-radius: 22px; overflow: hidden; border: 1px solid var(--border); background: rgba(255,255,255,.78); box-shadow: 0 18px 50px rgba(16,32,58,.12); min-height: 0; }
    iframe { width: 100%; height: 100%; border: 0; display: block; background: white; }
    .note { font-size: .84rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="shell">
    <header class="bar">
      <div class="brand">
        <strong>Trainer Database</strong>
        <span>Static Vercel shell + PHP backend host</span>
      </div>
      <div class="actions">
        <a id="openBackend" class="btn primary" href="#" target="_blank" rel="noreferrer">Open backend</a>
        <span class="note" id="statusText">Loading backend URL…</span>
      </div>
    </header>
    <main class="frameWrap">
      <iframe id="appFrame" title="Trainer Database App"></iframe>
    </main>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const defaultBackend = 'https://trainer-database.onrender.com/';
    const backendUrl = (params.get('backend') || defaultBackend).replace(/\/$/, '') + '/';
    const frame = document.getElementById('appFrame');
    const link = document.getElementById('openBackend');
    const statusText = document.getElementById('statusText');

    frame.src = backendUrl;
    link.href = backendUrl;

    statusText.textContent = backendUrl;
  </script>
</body>
</html>
